# Runnable local static-mode config.
# Copy this to ./cockpit/config.yaml and replace the placeholder secrets before you start the server.

host: "127.0.0.1"
port: 8317

# In local static mode, auth JSON files live here.
auth-dir: "./cockpit"

# Optional inbound API keys for callers of this proxy. Leave empty for local-only use.
api-keys: []
passthrough-headers: false

streaming:
  keepalive-seconds: 15
  bootstrap-retries: 2

request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

quota-exceeded:
  switch-project: true

routing:
  strategy: "round-robin"

ws-auth: false

codex-api-key:
  - api-key: "sk-codex-replace-me"
    base-url: "https://api.openai.com/v1"
    websockets: true
    headers: {}
