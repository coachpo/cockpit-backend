# Full inventory of supported config keys.
# For a runnable local config, start from config.starter.yaml instead.
api-keys: []
passthrough-headers: false
streaming:
  keepalive-seconds: 15
  bootstrap-retries: 2
nonstream-keepalive-interval: 0
host: ""
port: 8317
remote-management:
  allow-remote: false
  # Plaintext values are hashed automatically when the config is loaded or saved.
  secret-key: "change-me-to-a-strong-password"
auth-dir: "./cockpit"
disable-cooling: false
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30
quota-exceeded:
  switch-project: true
routing:
  strategy: round-robin
ws-auth: false
codex-api-key:
  - api-key: "sk-codex-replace-me"
    priority: 100
    base-url: https://api.openai.com/v1
    websockets: true
    headers: {}
codex-header-defaults:
  user-agent: ""
  beta-features: ""
