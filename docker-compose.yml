name: cockpit

services:
  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.3.2}
    container_name: nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
    volumes:
      - nacos-data:/home/nacos/data
    restart: unless-stopped

  cockpit:
    image: ${COCKPIT_IMAGE:-${CLI_PROXY_IMAGE:-coachpo/cockpit:latest}}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cockpit
    depends_on:
      - nacos
    environment:
      DEPLOY: ${DEPLOY:-cloud}
      NACOS_ADDR: ${NACOS_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-}
      NACOS_CACHE_DIR: ${NACOS_CACHE_DIR:-/tmp/nacos/cache}
    ports:
      - "8317:8317"
    volumes:
      - cockpit-auth:/root/.cockpit
      - nacos-cache:/tmp/nacos/cache
    restart: unless-stopped

volumes:
  cockpit-auth:
  nacos-data:
  nacos-cache:
