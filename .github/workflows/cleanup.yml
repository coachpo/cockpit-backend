name: Backend Cleanup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  cleanup-workflow-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Delete old Backend CI runs
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
          delete_workflow_pattern: Backend CI

      - name: Delete old Backend Release runs
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
          delete_workflow_pattern: Backend Release

  cleanup-releases:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Delete outdated releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: 10
        run: |
          release_rows="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq -sr --argjson keep "$KEEP_RELEASES" '
                  add
                  | map(select(.draft | not))
                  | sort_by(.created_at)
                  | reverse
                  | .[$keep:]
                  | .[]
                  | [.id, .tag_name] | @tsv
                '
          )"

          if [ -z "$release_rows" ]; then
            echo "No releases to delete."
            exit 0
          fi

          while IFS=$'\t' read -r release_id tag_name; do
            [ -n "$release_id" ] || continue
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag_name}" || true
          done <<< "$release_rows"
